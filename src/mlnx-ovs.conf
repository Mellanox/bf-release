CREATE_OVS_BRIDGES="yes"
OVS_HW_OFFLOAD="yes"
OVS_START_TIMEOUT=30
OVS_TIMEOUT=300
OVS_BR_PORTS_TIMEOUT=30
# OVS bridge names and ports. Defaults are defined in /sbin/mlnx_bf_configure
# OVS_BRIDGE1="ovsbr1"
# OVS_BRIDGE1_PORTS="p0 pf0hpf en3f0pf0sf0"
# OVS_BRIDGE2="ovsbr2"
# OVS_BRIDGE2_PORTS="p1 pf1hpf en3f1pf1sf0"

# Skip OVS configuration validation
# If SKIP_OVS_CONFIG_VALIDATION is set to "no", OVS configuration validation will be performed:
# if ports included in the configuration are not present in the system, except for VF representors
# and tunnel ports, OVS configuration is invalid and OVS configuration will be reset to the default
# configuration.
# If SKIP_OVS_CONFIG_VALIDATION is set to "yes", OVS configuration validation will be skipped and OVS
# configuration will not be reset to the default configuration.
SKIP_OVS_CONFIG_VALIDATION="yes"
